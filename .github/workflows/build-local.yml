name: Build VoiceInk (local, unsigned)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install prebuilt whisper.xcframework
        run: |
          mkdir -p "$HOME/VoiceInk-Dependencies/whisper.cpp"
          curl -sL -o /tmp/whisper-xcfw.zip \
            https://github.com/ggml-org/whisper.cpp/releases/download/v1.8.6/whisper-v1.8.6-xcframework.zip
          unzip -q /tmp/whisper-xcfw.zip -d "$HOME/VoiceInk-Dependencies/whisper.cpp"
          test -d "$HOME/VoiceInk-Dependencies/whisper.cpp/build-apple/whisper.xcframework"

      - name: Build VoiceInk (LOCAL_BUILD, ad-hoc signed)
        run: |
          xcodebuild -project VoiceInk.xcodeproj -scheme VoiceInk -configuration Debug \
            -derivedDataPath .local-build \
            -xcconfig LocalBuild.xcconfig \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            CODE_SIGN_ENTITLEMENTS="$PWD/VoiceInk/VoiceInk.local.entitlements" \
            SWIFT_ACTIVE_COMPILATION_CONDITIONS='$(inherited) LOCAL_BUILD' \
            build

      - name: Zip app bundle
        run: |
          ditto -c -k --keepParent \
            ".local-build/Build/Products/Debug/VoiceInk.app" VoiceInk.app.zip

      - uses: actions/upload-artifact@v4
        with:
          name: VoiceInk-app
          path: VoiceInk.app.zip
          retention-days: 7
